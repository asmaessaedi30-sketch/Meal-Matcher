{% extends "layout.html" %}

{% block body %}
<div class="form-container auth-container">
    <h2>Reset Password</h2>
    <p class="subtitle">Enter your account email and we will send a password reset link.</p>

    {% if error %}
    <div class="error-message">{{ error }}</div>
    {% endif %}

    <form action="/forgot_password" method="POST" class="auth-form">
        <div class="input-group">
            <label for="email">Email:</label>
            <input
                id="email"
                name="email"
                type="email"
                autocomplete="email"
                required
            >
        </div>

        <button type="submit" class="submit-btn">Send Reset Link</button>
    </form>

    <p class="auth-switch">Remembered it? <a href="/login">Log in</a></p>
</div>
{% endblock %}

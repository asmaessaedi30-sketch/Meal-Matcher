{% extends "layout.html" %}

{% block body %}
<div class="form-container auth-container">
    <h2>Enter Reset Code</h2>
    <p class="subtitle">Use the 6-digit code from your email to choose a new password.</p>

    {% if error %}
    <div class="error-message">{{ error }}</div>
    {% endif %}

    {% if success %}
    <div class="success-message">{{ success }}</div>
    {% endif %}


    <form action="/reset_password" method="POST" class="auth-form">
        <div class="input-group">
            <label for="email">Email:</label>
            <input
                id="email"
                name="email"
                type="email"
                autocomplete="email"
                value="{{ email or '' }}"
                required
            >
        </div>

        <div class="input-group">
            <label for="reset_code">Reset Code:</label>
            <input
                id="reset_code"
                name="reset_code"
                type="text"
                inputmode="numeric"
                maxlength="6"
                required
            >
        </div>

        <div class="input-group">
            <label for="password">New Password:</label>
            <input
                id="password"
                name="password"
                type="password"
                autocomplete="new-password"
                required
            >
        </div>

        <div class="input-group">
            <label for="confirmation">Confirm New Password:</label>
            <input
                id="confirmation"
                name="confirmation"
                type="password"
                autocomplete="new-password"
                required
            >
        </div>

        <button type="submit" class="submit-btn">Update Password</button>
    </form>

    <p class="auth-switch">Need a new code? <a href="/forgot_password">Request one</a></p>
</div>
{% endblock %}
